# Default configuration, shipped with the package. Consumers override any
# key per repo via a `.doc-checks.yaml` at their repo root — sections are
# merged key-by-key over these defaults (see doc_checks.get_config).

cd_refs:
  # Markdown files to scan for stale `cd <path>` references
  scan_globs:
    - "**/*.md"
    - "**/*.markdown"
  exclude_globs:
    - ".venv/**"
    - "node_modules/**"
    - ".pytest_cache/**"
    - ".ruff_cache/**"
    # CHANGELOG entries are historical: they may legitimately mention a path
    # that existed at the time of release but has since moved.
    - "CHANGELOG.md"
    - "**/CHANGELOG.md"
  # ``cd`` arguments starting with any of these prefixes are skipped — they
  # point at locations outside the repo (system dirs, user-supplied paths).
  ignore_prefixes:
    - "/Users/"
    - "/home/"

mermaid:
  scan_globs:
    - "**/*.md"
    - "**/*.markdown"
  exclude_globs:
    - ".venv/**"
    - "node_modules/**"
    - ".pytest_cache/**"
    - ".ruff_cache/**"
    - "CHANGELOG.md"
    - "**/CHANGELOG.md"
  # When false (default) the check silently passes if ``mmdc`` is not on PATH,
  # so contributors without the Node toolchain aren't blocked. CI flips this
  # (or sets DOC_CHECK_MERMAID_REQUIRE=1) to demand validation.
  require_mmdc: false

py_imports:
  scan_globs:
    - "**/*.md"
    - "**/*.markdown"
  exclude_globs:
    - ".venv/**"
    - "node_modules/**"
    - ".pytest_cache/**"
    - ".ruff_cache/**"
    - "CHANGELOG.md"
    - "**/CHANGELOG.md"
  # Top-level packages whose imports we statically validate. Anything outside
  # these (third-party, stdlib) is left to ``pyproject.toml`` / dependency
  # tooling. Override per repo via `.doc-checks.yaml` with your package names.
  project_packages:
    - src
    - lib
    - scripts

make_refs:
  # Makefiles that define legitimate targets (relative to repo root)
  makefiles:
    - Makefile
  # Markdown files to scan for stale `make <target>` references
  scan_globs:
    - "**/*.md"
    - "**/*.markdown"
  # Paths to skip (glob patterns relative to repo root)
  exclude_globs:
    - ".venv/**"
    - "node_modules/**"
    - ".pytest_cache/**"
    - ".ruff_cache/**"
    # CHANGELOG entries are historical: they may legitimately mention a target
    # that existed at the time of release but has since been renamed/removed.
    - "CHANGELOG.md"
    - "**/CHANGELOG.md"
  # Targets that should be treated as valid even if not in the Makefile.
  # Use sparingly — only for genuinely external references (e.g. mentioning
  # a target in a third-party project's Makefile within an example).
  ignore_targets: []

trees:
  # Markdown files to scan for ASCII project-trees
  scan_globs:
    - "**/*.md"
    - "**/*.markdown"
  exclude_globs:
    - ".venv/**"
    - "node_modules/**"
    - ".pytest_cache/**"
    - ".ruff_cache/**"
    # CHANGELOG entries are historical: a tree may legitimately depict a layout
    # that existed at the time of release but has since changed.
    - "CHANGELOG.md"
    - "**/CHANGELOG.md"
  # Branch-line names treated as placeholders rather than real paths.
  ignore_names:
    - "..."
    - "…"
    - "etc"
    - "etc."
  # Directories never walked when collecting existing basenames.
  prune_dirs:
    - ".git"
    - "node_modules"
    - ".venv"
    - "__pycache__"

env_vars:
  # Modules defining Pydantic ``BaseSettings`` classes (globs, repo-relative).
  # Override per repo to point at your actual settings module(s).
  config_globs:
    - "**/config.py"
    - "**/settings.py"
    - "**/conf.py"
  exclude_globs:
    - ".venv/**"
    - "node_modules/**"
    - ".pytest_cache/**"
    - ".ruff_cache/**"
  # The example env file fields are compared against.
  env_example: ".env.example"
  # README scanned (informationally) for an "Environment Variables" section.
  readme_file: "README.md"
  # Class names recognized as Pydantic Settings sources. Subclasses of these
  # (within the same file) are picked up transitively.
  settings_base_classes:
    - BaseSettings
  # Class attributes that are not real env vars (internal Pydantic config).
  ignore_fields:
    - model_config
  # ``.env.example`` vars that legitimately map to no settings field — e.g.
  # ones consumed via ``os.getenv`` or by external services / Docker Compose.
  known_non_config_vars: []

endpoints:
  # Framework/internal endpoints silently excluded from doc checks.
  internal:
    - /status
    - /health
    - /docs
    - /openapi.json
    - /redoc
    - /
  # Decorator receiver names treated as routers: ``@router.get`` / ``@app.post``.
  router_names:
    - router
    - app
  # HTTP methods recognized on a router decorator.
  methods:
    - get
    - post
    - put
    - delete
    - patch
    - head
    - options
  # Regex prefixes stripped from paths before comparison (versioned API roots).
  strip_path_prefixes:
    - '^/api/v\d+'
  # Service definitions: name → endpoints source dir + readme files (repo-relative).
  # Empty by default — the check passes trivially until a consumer configures
  # at least one service. Example:
  #   services:
  #     api:
  #       endpoints_dir: src/api/endpoints
  #       readme_files:
  #         - README.md
  services: {}

runner:
  # Execution order for checks — cheapest/fastest first for effective fail-fast behaviour.
  # Any check_*.py module not listed here is auto-appended in alphabetical order.
  order:
    - make_refs
    - cd_refs
    - py_imports
    - trees
    - env_vars
    - endpoints
    - mermaid
  # Human-readable labels for console output
  labels:
    make_refs: Make Ref Audit
    cd_refs: CD Ref Audit
    py_imports: Py Import Audit
    trees: Tree Ref Audit
    env_vars: Env Var Audit
    endpoints: Endpoint Registry
    mermaid: Mermaid Audit
